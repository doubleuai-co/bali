<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harzock Hotel — Order & Concierge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background-color: #0d0d0d;
      color: #e8dfc8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero {
      text-align: center;
      padding: 60px 24px;
      max-width: 640px;
    }

    .logo-mark {
      margin-bottom: 28px;
    }

    .logo-mark img {
      height: 100px;
      width: auto;
      object-fit: contain;
    }

    h1 {
      font-size: 42px;
      font-weight: 400;
      letter-spacing: 2px;
      color: #f0e6cc;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: #9e8a6a;
      margin: 20px auto;
    }

    p {
      font-size: 15px;
      color: #a89878;
      line-height: 1.8;
      letter-spacing: 0.3px;
    }

    .cta-hint {
      margin-top: 40px;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6b5e48;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    footer {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a3228;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo-mark">
      <img src="https://cm4-production-assets.s3.amazonaws.com/1775141876349-harzock-logo.png" alt="Harzock Hotel" />
    </div>
    <h1>A Stay Worth Remembering</h1>
    <div class="divider"></div>
    <p>Place your order, make a reservation, or ask us anything — our concierge is available around the clock.</p>
    <div class="cta-hint">Chat with us below</div>
  </div>

  <footer>Powered by DoubleU AI</footer>

  <!-- Voiceflow Chat Widget -->
  <script type="text/javascript">
    (function (document, tagName) {
      const urlParams = new URLSearchParams(window.location.search);
      let initialTableId = urlParams.has("tableId") ? urlParams.get("tableId") : null;
      let initialVendorId = urlParams.has("vendorId") ? urlParams.get("vendorId") : null;
      let initialBranchId = urlParams.has("branchId") ? urlParams.get("branchId") : null;
      let initialMessage = urlParams.has("message") ? urlParams.get("message") : null;

      window.tableId = initialTableId;
      window.vendorId = initialVendorId;
      window.branchId = initialBranchId;
      window.message = initialMessage;

      const FileUploadExtension = {
        name: 'FileUpload',
        type: 'response',
        match: ({ trace }) =>
          trace.type === 'ext_fileUpload' || trace.payload?.name === 'ext_fileUpload',
        render: ({ trace, element }) => {
          const CLOUD_NAME = 'dxfsirjog';
          const UPLOAD_PRESET = 'DoubleU';
          const MAX_RETRIES = 3;
          const MAX_FILE_SIZE_MB = 20;
          const container = document.createElement('div');
          container.innerHTML = `
            <style>
              .file-upload-box{border:2px dashed rgba(46,110,225,0.5);padding:16px;text-align:center;cursor:pointer;border-radius:8px;font-size:14px;font-weight:500;color:#2e6ee1;background-color:rgba(46,110,225,0.05);transition:all 0.2s ease}
              .file-upload-box:hover{background-color:rgba(46,110,225,0.15);border-color:rgba(46,110,225,0.7)}
              .upload-status{font-size:13px;color:#555;padding:8px 0}
              .upload-error{font-size:13px;color:#cc0000;padding:8px 0}
              .retry-btn{margin-top:8px;padding:6px 14px;background:#2e6ee1;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px}
              .retry-btn:hover{background:#1a55c8}
            </style>
            <div class="file-upload-box">Click to upload</div>
            <input type="file" hidden />
          `;
          const fileInput = container.querySelector('input[type="file"]');
          const uploadBox = container.querySelector('.file-upload-box');
          const setStatus = (msg, isError = false) => {
            container.querySelectorAll('.upload-status, .upload-error').forEach(el => el.remove());
            const div = document.createElement('div');
            div.className = isError ? 'upload-error' : 'upload-status';
            div.innerHTML = msg;
            container.appendChild(div);
          };
          const uploadWithRetry = async (file, attempt = 1) => {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 20000);
            try {
              const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData, signal: controller.signal });
              clearTimeout(timeoutId);
              const result = await response.json();
              if (!response.ok || !result.secure_url) throw new Error(result.error?.message || 'Upload response invalid');
              return result.secure_url;
            } catch (err) {
              clearTimeout(timeoutId);
              const isTimeout = err.name === 'AbortError' || (err.message && err.message.toLowerCase().includes('timeout'));
              if (attempt < MAX_RETRIES) {
                setStatus(`⏳ ${isTimeout ? 'Timeout' : 'Upload error'} — retrying (${attempt}/${MAX_RETRIES})...`);
                await new Promise(res => setTimeout(res, 1500 * attempt));
                return uploadWithRetry(file, attempt + 1);
              }
              throw new Error(isTimeout ? 'timeout' : 'upload_failed');
            }
          };
          const handleFile = async (file) => {
            const fileSizeMB = file.size / (1024 * 1024);
            if (fileSizeMB > MAX_FILE_SIZE_MB) { setStatus(`❌ File too large (${fileSizeMB.toFixed(1)}MB). Max ${MAX_FILE_SIZE_MB}MB.`, true); return; }
            uploadBox.style.display = 'none';
            setStatus(`⬆️ Uploading <strong>${file.name}</strong>...`);
            try {
              const fileUrl = await uploadWithRetry(file);
              setStatus(`✅ Analyzing <strong>${file.name}</strong>...`);
              window.voiceflow.chat.interact({ type: 'complete', payload: { file: fileUrl } });
            } catch (err) {
              uploadBox.style.display = '';
              if (err.message === 'timeout') {
                setStatus(`❌ Upload timed out after ${MAX_RETRIES} attempts.<br>Try a smaller file or check your connection.<br><button class="retry-btn" id="retry-upload">Try Again</button>`, true);
              } else {
                setStatus(`❌ Upload failed. Please try again.<br><button class="retry-btn" id="retry-upload">Try Again</button>`, true);
              }
              container.querySelector('#retry-upload')?.addEventListener('click', () => {
                container.querySelectorAll('.upload-status, .upload-error').forEach(el => el.remove());
                fileInput.value = '';
                fileInput.click();
              });
            }
          };
          uploadBox?.addEventListener('click', () => fileInput?.click());
          fileInput?.addEventListener('change', async function () {
            const file = this.files[0];
            if (!file) return;
            await handleFile(file);
          });
          element.appendChild(container);
        },
      };

      const voiceflowScript = document.createElement(tagName);
      const firstScriptTag = document.getElementsByTagName(tagName)[0];
      voiceflowScript.onload = () => {
        window.voiceflow.chat.load({
          verify: { projectID: '69ce1b3916442e28a69b2411' },
          url: 'https://general-runtime.voiceflow.com',
          versionID: 'production',
          assistant: { extensions: [FileUploadExtension] },
          launch: {
            event: {
              type: 'launch',
              payload: {
                table_id: window.tableId || "undefined",
                vendor_id: window.vendorId || "undefined",
                branch_id: window.branchId || "undefined",
                message: window.message || "undefined",
              },
            },
          }
        }).then(() => {
          setTimeout(() => { window.voiceflow.chat.open(); }, 5000);
        });
      };
      voiceflowScript.src = 'https://cdn.voiceflow.com/widget-next/bundle.mjs';
      voiceflowScript.type = 'text/javascript';
      firstScriptTag.parentNode.insertBefore(voiceflowScript, firstScriptTag);
    })(document, 'script');
  </script>

</body>
</html>
