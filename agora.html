<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agora — AI Event Manager | BALI Africa</title>
  <meta name="description" content="Agora handles ticket sales, table bookings, and event commerce end-to-end. Built for event planners and promoters." />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --bg2: #0d0d0d;
      --text: #e8e8e8;
      --muted: #666;
      --border: rgba(255,255,255,0.07);
      --card: #111;
      --accent: #8b5cf6;
      --accent-dim: rgba(139,92,246,0.1);
      --accent-border: rgba(139,92,246,0.25);
      --accent-text: #a78bfa;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% -5%, rgba(139,92,246,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── BALI TOPBAR ── */
    .bali-bar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 300;
      height: 36px;
      background: #050505;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .bali-bar-logo {
      font-family: 'Space Mono', monospace;
      font-size: 12px; font-weight: 700;
      color: #e8e8e8; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
    }
    .bali-bar-logo .back { color: #555; font-size: 11px; }
    .bali-bar-logo .dot { color: #0040ff; }
    .bali-product-badge {
      font-family: 'Space Mono', monospace;
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent-text);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      padding: 3px 10px; border-radius: 100px;
    }
    .bali-product-badge::before {
      content: '● ';
      color: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── LAYOUT ── */
    .page {
      margin-top: 36px;
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* ── PRODUCT HEADER ── */
    .product-header {
      padding: 40px 24px 32px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
    }

    .product-icon {
      width: 64px; height: 64px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .product-name {
      font-family: 'Space Mono', monospace;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .product-role {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-text);
      margin-bottom: 16px;
    }

    .product-desc {
      color: var(--muted);
      font-size: 15px;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.75;
    }

    .product-desc strong { color: var(--text); }

    /* ── DIVIDER ── */
    .header-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── CHAT CONTAINER ── */
    .chat-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 24px 0;
    }

    #vfrc-container {
      width: 100%;
      max-width: 800px;
      height: 75vh;
      min-height: 500px;
      display: flex;
      flex-direction: column;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* ── FOOTER ── */
    footer {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      border-top: 1px solid var(--border);
      margin-top: 32px;
      position: relative;
      z-index: 1;
    }

    footer a {
      text-decoration: none;
      color: inherit;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--text); }

    .footer-brand {
      font-family: 'Space Mono', monospace;
      font-size: 13px; font-weight: 700;
      color: var(--text);
    }

    .footer-brand .dot { color: #0040ff; }
    .footer-copy { font-size: 12px; color: var(--muted); }

    .footer-links {
      display: flex; gap: 20px;
      font-size: 12px; color: var(--muted);
    }

    @media (max-width: 600px) {
      .product-header { padding: 28px 16px 20px; }
      footer { flex-direction: column; align-items: flex-start; }
      #vfrc-container { height: 65vh; }
    }
  </style>
</head>
<body>

  <!-- BALI TOPBAR -->
  <div class="bali-bar">
    <a href="https://baliafrica.com" class="bali-bar-logo">
      <span class="back">←</span> BALI<span class="dot">.</span>africa
    </a>
    <span class="bali-product-badge">Agora / Events</span>
  </div>

  <div class="page">

    <!-- PRODUCT HEADER -->
    <div class="product-header">
      <div class="product-icon">🎟️</div>
      <h1 class="product-name">Agora</h1>
      <p class="product-role">AI Event Manager</p>
      <p class="product-desc">
        Sell tickets, manage table bookings, and run event commerce end-to-end —
        <strong>without the manual back-and-forth.</strong>
        Tell Agora what you need and it handles the rest.
      </p>
    </div>

    <div class="header-divider"></div>

    <!-- VOICEFLOW EMBEDDED CHAT -->
    <div class="chat-wrap">
      <div id="vfrc-container"></div>
    </div>

    <!-- FOOTER -->
    <footer>
      <a href="https://baliafrica.com" class="footer-brand">BALI<span class="dot">.</span>africa</a>
      <span class="footer-copy">© 2026 DoubleU AI. All rights reserved.</span>
      <div class="footer-links">
        <a href="https://doubleuai.co" target="_blank">doubleuai.co</a>
        <a href="mailto:info@doubleuai.co">Contact</a>
      </div>
    </footer>

  </div>

  <script type="text/javascript">
    (function (document, tagName) {
      const urlParams = new URLSearchParams(window.location.search);
      const salesPerson = urlParams.get('sales') || 'auto_update_user';

      const FileUploadExtension = {
        name: 'FileUpload',
        type: 'response',
        match: ({ trace }) =>
          trace.type === 'ext_fileUpload' || trace.payload?.name === 'ext_fileUpload',
        render: ({ trace, element }) => {
          const container = document.createElement('div');
          container.innerHTML = `
            <style>
              .file-upload-box {
                border: 2px dashed rgba(139,92,246,0.4);
                padding: 16px; text-align: center; cursor: pointer;
                border-radius: 8px; font-size: 14px; font-weight: 500;
                color: #a78bfa;
                background-color: rgba(139,92,246,0.05);
                transition: all 0.2s ease;
              }
              .file-upload-box:hover {
                background-color: rgba(139,92,246,0.12);
                border-color: rgba(139,92,246,0.6);
              }
            </style>
            <div class="file-upload-box">Click to upload</div>
            <input type="file" hidden />
          `;
          const fileInput = container.querySelector('input[type="file"]');
          const uploadBox = container.querySelector('.file-upload-box');
          uploadBox?.addEventListener('click', () => fileInput?.click());
          fileInput?.addEventListener('change', async function () {
            const file = this.files[0];
            if (!file) return;
            container.innerHTML = `<div>Uploading ${file.name}...</div>`;
            try {
              const formData = new FormData();
              formData.append('image', file);
              const response = await fetch('https://api.imgbb.com/1/upload?key=c7f0fc9881a6da201a18622dcd0e5cff', {
                method: 'POST', body: formData,
              });
              const result = await response.json();
              if (!response.ok || !result.data?.url) throw new Error('Failed to upload file');
              container.innerHTML = `<div>Analyzing ${file.name}...</div>`;
              window.voiceflow.chat.interact({ type: 'complete', payload: { file: result.data.url } });
            } catch (err) {
              console.error('Upload Error:', err);
              container.innerHTML = '<div>Error during upload. Please try again.</div>';
            }
          });
          element.appendChild(container);
        },
      };

      const voiceflowScript = document.createElement(tagName);
      const firstScriptTag = document.getElementsByTagName(tagName)[0];
      voiceflowScript.onload = () => {
        window.voiceflow.chat.load({
          verify: { projectID: '69debd60eb0390b51363ce48' },
          url: 'https://general-runtime.voiceflow.com',
          versionID: 'production',
          render: {
            mode: 'embedded',
            target: document.getElementById('vfrc-container')
          },
          assistant: { extensions: [FileUploadExtension] },
        });
      };
      voiceflowScript.src = 'https://cdn.voiceflow.com/widget-next/bundle.mjs';
      voiceflowScript.type = 'text/javascript';
      firstScriptTag.parentNode.insertBefore(voiceflowScript, firstScriptTag);
    })(document, 'script');
  </script>

</body>
</html>
